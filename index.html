<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paysend Social Builder</title>
  <style>
    @font-face {
      font-family: 'GT Standard';
      src: url('/fonts/GT-Standard-L-Standard-Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('/fonts/GT-Standard-L-Standard-Medium.woff2') format('woff2');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('/fonts/GT-Standard-L-Standard-Semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('/fonts/GT-Standard-L-Standard-Bold.woff2') format('woff2');
      font-weight: 700; font-style: normal; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #141414;
      --bg:  #ffffff;
      --margin: 20px;
      --tile-gap: 4px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'GT Standard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Each screen takes the full viewport ──────────────────── */
    .screen {
      display: none;
      width: 100vw;
      min-height: 100vh;
      padding: var(--margin);
      grid-template-rows: auto 1fr auto;
      gap: 0;
    }
    .screen.active { display: grid; }

    /* ─── Top bar: breadcrumb (left) + planet logo (right) ─────── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .crumb {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.2;
      padding-top: 4px;
    }
    .crumb-item {
      text-decoration: underline;
      text-underline-offset: 2px;
      color: var(--ink);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      text-align: left;
    }
    .crumb-item:hover { opacity: 0.55; }
    .crumb-arrow {
      font-size: 14px;
      line-height: 1;
      user-select: none;
    }
    .home-logo {
      width: 32px;
      height: 32px;
      display: block;
      flex-shrink: 0;
    }

    /* ─── Title block (left, large) ────────────────────────────── */
    .titles {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 50%;
    }
    .titles h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .titles h2 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    /* ─── Tiles row (full-width at the bottom) ─────────────────── */
    .tiles {
      display: grid;
      gap: var(--tile-gap);
      align-self: end;
    }
    .tiles.cols-2 { grid-template-columns: 1fr 1fr; }
    .tiles.cols-3 { grid-template-columns: repeat(3, 1fr); }

    .tile {
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.15;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      min-height: 44px;
    }
    .tile:hover  { background: #2a2a2a; }
    .tile:active { background: #000; }
    .tile.span-2 { grid-column: span 2; }

    /* ─── Layout picker (Screen 3) ──────────────────────────────
       Always a single row. Cards keep their 4:5 aspect ratio
       and share the row width equally — but the row never grows
       past 50 % of the viewport height. JS caps each card's
       width when needed so adding more options shrinks the
       thumbnails instead of pushing the row taller. */
    .layout-grid {
      display: flex;
      flex-wrap: nowrap;
      gap: var(--tile-gap);
      align-self: end;
      align-items: flex-start;
    }
    .layout-card {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .layout-thumb {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #ddd;
      overflow: hidden;
      position: relative;
    }
    .layout-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .layout-card:hover .layout-thumb { opacity: 0.92; }
    .layout-name {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: 0.01em;
    }
    .wip-thumb {
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        45deg, #e8e8e8 0 12px, #dcdcdc 12px 24px);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 22px;
      color: #888;
      letter-spacing: 0.08em;
    }

    /* ─── Small screens ─────────────────────────────────────────── */
    @media (max-width: 760px) {
      .titles { max-width: 100%; }
      .titles h1, .titles h2 { font-size: 26px; }
      .tile { font-size: 14px; padding: 10px 12px; min-height: 38px; }
      .tiles.cols-3 { grid-template-columns: 1fr 1fr; }
      .crumb { font-size: 14px; }
    }
  </style>
</head>
<body>
  <!-- ─────────────── Screen 1: Purpose ─────────────── -->
  <section class="screen active" data-screen="1">
    <div class="top-bar">
      <nav class="crumb" id="crumb-1">
        <button class="crumb-item" data-goto="1">Main</button>
        <span class="crumb-arrow">→</span>
      </nav>
      <img class="home-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </div>
    <div class="titles">
      <h1>Hey!</h1>
      <h2>Welcome to the Paysend °<br/>social media content builder</h2>
      <h2>What are you up to today?</h2>
    </div>
    <div class="tiles cols-3" id="purpose-tiles"></div>
  </section>

  <!-- ─────────────── Screen 2: Activity ─────────────── -->
  <section class="screen" data-screen="2">
    <div class="top-bar">
      <nav class="crumb" id="crumb-2"></nav>
      <img class="home-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </div>
    <div class="titles">
      <h1>Great!</h1>
      <h2>Now it's time to choose the<br/>type of media we're making</h2>
    </div>
    <div class="tiles cols-2" id="activity-tiles"></div>
  </section>

  <!-- ─────────────── Screen 3: Layout ─────────────── -->
  <section class="screen" data-screen="3">
    <div class="top-bar">
      <nav class="crumb" id="crumb-3"></nav>
      <img class="home-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </div>
    <div class="titles">
      <h1>One last step</h1>
      <h2>Choose a layout you want<br/>to use for your task</h2>
    </div>
    <div class="layout-grid" id="layout-grid"></div>
  </section>

  <script src="/assets/data/loader.js"></script>
  <script>
  /* All wizard content (purposes, activities, layout assignments,
     family routes) is loaded from /assets/data/layouts.json so a
     single edit there updates the wizard everywhere. */
  let PURPOSES, ACTIVITIES, FAMILY_ROUTE, ASSIGNMENTS;

  // ─── State ──────────────────────────────────────────────────
  const state = { purposeId: null, activityId: null };

  const $screens   = document.querySelectorAll('.screen');
  const $purpose   = document.getElementById('purpose-tiles');
  const $activity  = document.getElementById('activity-tiles');
  const $grid      = document.getElementById('layout-grid');
  const $crumb2    = document.getElementById('crumb-2');
  const $crumb3    = document.getElementById('crumb-3');

  function purposeLabel() {
    const p = PURPOSES.find(p => p.id === state.purposeId);
    return p ? p.label : '';
  }
  function activityLabel() {
    const list = ACTIVITIES[state.purposeId] || [];
    const a = list.find(a => a.id === state.activityId);
    return a ? a.label : '';
  }
  function showScreen(n) {
    $screens.forEach(s => s.classList.toggle('active', +s.dataset.screen === n));
    window.scrollTo({ top: 0 });
    if (n === 3) requestAnimationFrame(fitLayoutGrid);
  }

  // ─── Render: tiles ───
  function renderPurpose() {
    $purpose.innerHTML = '';
    PURPOSES.forEach((p) => {
      const btn = document.createElement('button');
      btn.className = 'tile';
      btn.textContent = p.label;
      btn.addEventListener('click', () => {
        state.purposeId = p.id;
        state.activityId = null;
        renderActivity();
        renderCrumb2();
        showScreen(2);
      });
      $purpose.appendChild(btn);
    });
  }

  function renderActivity() {
    $activity.innerHTML = '';
    const list = ACTIVITIES[state.purposeId] || [];
    list.forEach((a, i) => {
      const btn = document.createElement('button');
      btn.className = 'tile';
      btn.textContent = a.label;
      // odd count → last one spans the row
      if (i === list.length - 1 && list.length % 2 === 1) {
        btn.classList.add('span-2');
      }
      btn.addEventListener('click', () => {
        state.activityId = a.id;
        renderGrid();
        renderCrumb3();
        showScreen(3);
      });
      $activity.appendChild(btn);
    });
  }

  function renderGrid() {
    $grid.innerHTML = '';
    const groups = (ASSIGNMENTS[state.purposeId] || {})[state.activityId]
                || [['wip']];

    groups.forEach(variants => {
      const first   = variants[0];
      const isWip   = first === 'wip' || /^\d+$/.test(first);
      const family  = isWip
        ? parseInt(first === 'wip' ? '0' : first, 10)
        : parseInt(first.split('.')[0], 10);
      const route   = FAMILY_ROUTE[family] || '/work-in-progress.html';

      // Pass purpose + activity ids so the builder can render its own breadcrumb
      const ctx = `p=${state.purposeId}&a=${state.activityId}`;
      const href = isWip
        ? `${route}?${ctx}`
        : `${route}?${ctx}&variants=${variants.join(',')}`;

      const label = isWip
        ? `Layout ${first === 'wip' ? '?' : first} — WIP`
        : variants.join(' · ');
      const thumb = isWip
        ? ''
        : `/assets/placeholders/${variants[0]}.jpg`;

      const a = document.createElement('a');
      a.className = 'layout-card';
      a.href = href;
      a.innerHTML = `
        <div class="layout-thumb">
          ${thumb
            ? `<img src="${thumb}" alt="Layout ${label}" onerror="this.style.display='none'"/>`
            : `<div class="wip-thumb">WIP</div>`}
        </div>
        <div class="layout-name">${label}</div>
      `;
      $grid.appendChild(a);
    });
    // fitLayoutGrid runs from showScreen(3), once the row is visible
    // (it can't measure clientWidth while the screen is display:none).
  }

  /* Cap each card's width so the whole row stays within 50 % of
     the viewport height. With few cards (e.g. 3) the cards naturally
     fit; with many (e.g. 6) the cap kicks in and shrinks them. */
  const TILE_GAP = 4, LABEL_RESERVE = 26, MAX_ROW_FRACTION = 0.5;
  function fitLayoutGrid() {
    if (!$grid || $grid.children.length === 0) return;
    const cards = $grid.querySelectorAll('.layout-card');
    const count = cards.length;
    const containerW = $grid.clientWidth;
    const widthPerCard = (containerW - TILE_GAP * (count - 1)) / count;
    const maxRowH = window.innerHeight * MAX_ROW_FRACTION;
    const maxThumbH = maxRowH - LABEL_RESERVE;
    const maxThumbW = maxThumbH * 4 / 5;
    const cardW = Math.min(widthPerCard, maxThumbW);
    const useFixed = cardW < widthPerCard - 0.5;
    cards.forEach(c => {
      if (useFixed) {
        c.style.flex  = 'none';
        c.style.width = cardW + 'px';
      } else {
        c.style.flex  = '';
        c.style.width = '';
      }
    });
    $grid.style.justifyContent = useFixed ? 'flex-start' : '';
  }
  window.addEventListener('resize', fitLayoutGrid);

  // ─── Breadcrumbs ────────────────────────────────────────────
  function makeCrumbItem(label, onClick) {
    const b = document.createElement('button');
    b.className = 'crumb-item';
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }
  function makeArrow() {
    const s = document.createElement('span');
    s.className = 'crumb-arrow';
    s.textContent = '→';
    return s;
  }
  function renderCrumb2() {
    $crumb2.innerHTML = '';
    $crumb2.appendChild(makeCrumbItem('Main', () => showScreen(1)));
    $crumb2.appendChild(makeArrow());
    $crumb2.appendChild(makeCrumbItem(purposeLabel(), () => showScreen(2)));
    $crumb2.appendChild(makeArrow());
  }
  function renderCrumb3() {
    $crumb3.innerHTML = '';
    $crumb3.appendChild(makeCrumbItem('Main', () => showScreen(1)));
    $crumb3.appendChild(makeArrow());
    $crumb3.appendChild(makeCrumbItem(purposeLabel(), () => showScreen(2)));
    $crumb3.appendChild(makeArrow());
    $crumb3.appendChild(makeCrumbItem(activityLabel(), () => showScreen(3)));
    $crumb3.appendChild(makeArrow());
  }

  /* Boot once the JSON data is in. Until then the screens are blank
     — but the data files are tiny so this happens within one frame
     under normal network conditions. */
  (async function boot() {
    const data = await window.PaysendData;
    PURPOSES     = data.layouts.purposes;
    ACTIVITIES   = data.layouts.activities;
    ASSIGNMENTS  = data.layouts.assignments;
    // family-routes JSON keys are strings ("1"…"11"); coerce so the
    // existing `parseInt(...)` lookups still hit the right bucket.
    FAMILY_ROUTE = Object.fromEntries(
      Object.entries(data.layouts.familyRoutes).map(([k, v]) => [Number(k), v])
    );

    renderPurpose();

    // Deep-link: ?screen=2&p=hr or ?screen=3&p=hr&a=hiring
    // (used by builder-screen breadcrumbs to return to the right step)
    const params = new URLSearchParams(location.search);
    const target = parseInt(params.get('screen') || '1', 10);
    const p      = params.get('p');
    const a      = params.get('a');
    if (target === 2 && p && ACTIVITIES[p]) {
      state.purposeId = p; state.activityId = null;
      renderActivity(); renderCrumb2(); showScreen(2);
    } else if (target === 3 && p && a && ACTIVITIES[p]) {
      state.purposeId = p; state.activityId = a;
      renderActivity(); renderGrid(); renderCrumb3(); showScreen(3);
    }
  })();
  </script>
</body>
</html>
