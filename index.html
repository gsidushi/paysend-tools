<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paysend Social Builder</title>
  <style>
    /* ── Fonts (same as the builder) ─────────────────────────── */
    @font-face {
      font-family: 'GT Standard';
      src: url('/fonts/GT-Standard-L-Standard-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('/fonts/GT-Standard-L-Standard-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('/fonts/GT-Standard-L-Standard-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('/fonts/GT-Standard-L-Standard-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #141414;
      --bg:  #ffffff;
      --margin: 20px;
      --tile-gap: 4px;
      --tile-font: 24px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'GT Standard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Each screen takes the full viewport ─────────────────── */
    .screen {
      display: none;
      width: 100vw;
      min-height: 100vh;
      padding: var(--margin);
      grid-template-columns: 1fr 1fr;          /* two equal columns        */
      grid-template-rows: auto 1fr auto;        /* head, spacer, tiles      */
      column-gap: 0;
      row-gap: 0;
    }
    .screen.active { display: grid; }

    /* ── Left column: titles ─────────────────────────────────── */
    .titles {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .titles h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .titles h2 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    /* ── Right column: breadcrumb (left edge) + logo (right) ─ */
    .right-head {
      grid-column: 2;
      grid-row: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
    }
    .crumb {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.2;
      /* sits at the very left of the right column — i.e. the
         vertical centre axis of the whole page */
      padding-top: 4px;
    }
    .crumb-item {
      text-decoration: underline;
      text-underline-offset: 2px;
      color: var(--ink);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      text-align: left;
    }
    .crumb-item:hover { opacity: 0.55; }
    .crumb-arrow {
      font-size: 14px;
      line-height: 1;
      margin: 4px 0 8px;
      user-select: none;
    }
    .home-logo {
      width: 32px;
      height: 32px;
      display: block;
      align-self: start;
      justify-self: end;
    }

    /* ── Tiles row (full width at the bottom) ────────────────── */
    .tiles {
      grid-column: 1 / -1;
      grid-row: 3;
      display: grid;
      gap: var(--tile-gap);
    }
    .tiles.cols-2 { grid-template-columns: 1fr 1fr; }
    .tiles.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .tiles.cols-4 { grid-template-columns: repeat(4, 1fr); }

    .tile {
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 14px 16px;
      font-family: inherit;
      font-size: var(--tile-font);
      font-weight: 500;
      line-height: 1.15;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: visible;
    }
    .tile:hover  { background: #2a2a2a; }
    .tile:active { background: #000; }

    /* span helper for odd-count rows */
    .tile.span-2 { grid-column: span 2; }
    .tile.span-3 { grid-column: span 3; }

    /* ── Layout picker (Screen 3) ─────────────────────────────── */
    .layout-grid {
      grid-column: 1 / -1;
      grid-row: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--tile-gap);
    }
    .layout-card {
      display: block;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .layout-thumb {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #ddd;
      overflow: hidden;
      position: relative;
    }
    .layout-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .layout-card:hover .layout-thumb { opacity: 0.92; }
    .layout-name {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }

    /* ── Small screens ───────────────────────────────────────── */
    @media (max-width: 760px) {
      :root { --tile-font: 22px; }
      .screen { grid-template-columns: 1fr; }
      .titles h1, .titles h2 { font-size: 28px; }
      .right-head {
        grid-column: 1;
        grid-row: 2;
        margin-top: 16px;
      }
      .titles { grid-row: 1; }
      .tiles { grid-row: 3; }
      .tiles.cols-3 { grid-template-columns: 1fr 1fr; }
      .layout-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <!-- ─────────────── Screen 1: Purpose ─────────────── -->
  <section class="screen active" data-screen="1">
    <div class="titles">
      <h1>Hey!</h1>
      <h2>Welcome to the Paysend °<br/>social media content builder</h2>
      <h2>What are you up to today?</h2>
    </div>
    <div class="right-head">
      <nav class="crumb" id="crumb-1">
        <button class="crumb-item" data-goto="1">Main</button>
        <span class="crumb-arrow">↓</span>
      </nav>
      <img class="home-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </div>
    <div class="tiles cols-3" id="purpose-tiles"></div>
  </section>

  <!-- ─────────────── Screen 2: Activity ─────────────── -->
  <section class="screen" data-screen="2">
    <div class="titles">
      <h1>Great!</h1>
      <h2>Now it's time to choose the<br/>type of media we're making</h2>
    </div>
    <div class="right-head">
      <nav class="crumb" id="crumb-2"></nav>
      <img class="home-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </div>
    <div class="tiles cols-2" id="activity-tiles"></div>
  </section>

  <!-- ─────────────── Screen 3: Layout ─────────────── -->
  <section class="screen" data-screen="3">
    <div class="titles">
      <h1>One last step</h1>
      <h2>Choose a layout you want<br/>to use for your task</h2>
    </div>
    <div class="right-head">
      <nav class="crumb" id="crumb-3"></nav>
      <img class="home-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </div>
    <div class="layout-grid" id="layout-grid"></div>
  </section>

  <script>
  // ─── Content map ────────────────────────────────────────────
  const PURPOSES = [
    { id: 'hr',         label: 'HR / People' },
    { id: 'pr',         label: 'PR / News' },
    { id: 'personal',   label: 'Personal Brand' },
    { id: 'thought',    label: 'Thought Leadership' },
    { id: 'product',    label: 'Product / Sales' },
    { id: 'engagement', label: 'Engagement / Reach' },
  ];

  const ACTIVITIES = {
    hr: [
      { id: 'new-job',       label: 'New Job Announcement' },
      { id: 'promotion',     label: 'Promotion Announcement' },
      { id: 'hiring',        label: "We're Hiring" },
      { id: 'bts',           label: 'Behind-the-Scenes' },
    ],
    pr: [
      { id: 'company-news',  label: 'Company News' },
      { id: 'press-release', label: 'Press Release' },
      { id: 'partnership',   label: 'Partnership Announcement' },
    ],
    thought: [
      { id: 'insight',       label: 'Insight / POV' },
      { id: 'educational',   label: 'Educational / How-To' },
      { id: 'case-study',    label: 'Case Study' },
    ],
    product: [
      { id: 'feature',       label: 'Feature / Product Highlight' },
      { id: 'before-after',  label: 'Before / After' },
      { id: 'testimonial',   label: 'Customer Testimonial' },
    ],
    personal: [
      { id: 'story',         label: 'Story / Experience' },
      { id: 'unpopular',     label: 'Unpopular Opinion' },
      { id: 'founder-pov',   label: 'Founder POV' },
    ],
    engagement: [
      { id: 'question',      label: 'Question Post' },
      { id: 'poll',          label: 'Poll' },
      { id: 'relatable',     label: 'Relatable / Light Content' },
    ],
  };

  // All 6 layouts. Every card routes to /templates (Layout 1) for now —
  // re-sort/relink per branch later.
  const LAYOUTS = [
    { id: 1, name: 'Layout 1 — Event Portrait',   thumb: '/assets/placeholder-person1.png', href: '/templates' },
    { id: 2, name: 'Layout 2 — Event Landscape',  thumb: '/assets/placeholder-person2.png', href: '/templates' },
    { id: 3, name: 'Layout 3 — Event / New Hire', thumb: '/assets/person_placeholder.png',  href: '/templates' },
    { id: 4, name: 'Layout 4 — Event Portrait',   thumb: '/assets/placeholder-venue.png',   href: '/templates' },
    { id: 5, name: 'Layout 5 — Event Landscape',  thumb: '/assets/city-placeholder.png',    href: '/templates' },
    { id: 6, name: 'Layout 6 — Milestone',        thumb: '/assets/pattern-1.png',           href: '/templates' },
  ];

  // ─── State ──────────────────────────────────────────────────
  const state = { purposeId: null, activityId: null };

  const $screens   = document.querySelectorAll('.screen');
  const $purpose   = document.getElementById('purpose-tiles');
  const $activity  = document.getElementById('activity-tiles');
  const $grid      = document.getElementById('layout-grid');
  const $crumb2    = document.getElementById('crumb-2');
  const $crumb3    = document.getElementById('crumb-3');

  function purposeLabel() {
    const p = PURPOSES.find(p => p.id === state.purposeId);
    return p ? p.label : '';
  }
  function activityLabel() {
    const list = ACTIVITIES[state.purposeId] || [];
    const a = list.find(a => a.id === state.activityId);
    return a ? a.label : '';
  }
  function showScreen(n) {
    $screens.forEach(s => s.classList.toggle('active', +s.dataset.screen === n));
    window.scrollTo({ top: 0 });
  }

  // ─── Render: tiles auto-pack into rows of 4 (Screen 1) ────
  function renderPurpose() {
    $purpose.innerHTML = '';
    // 3 columns × 2 rows — every label fits without truncation.
    PURPOSES.forEach((p) => {
      const btn = document.createElement('button');
      btn.className = 'tile';
      btn.textContent = p.label;
      btn.addEventListener('click', () => {
        state.purposeId = p.id;
        state.activityId = null;
        renderActivity();
        renderCrumb2();
        showScreen(2);
      });
      $purpose.appendChild(btn);
    });
  }

  function renderActivity() {
    $activity.innerHTML = '';
    const list = ACTIVITIES[state.purposeId] || [];
    list.forEach((a, i) => {
      const btn = document.createElement('button');
      btn.className = 'tile';
      btn.textContent = a.label;
      // odd count → last one spans the row
      if (i === list.length - 1 && list.length % 2 === 1) {
        btn.classList.add('span-2');
      }
      btn.addEventListener('click', () => {
        state.activityId = a.id;
        renderGrid();
        renderCrumb3();
        showScreen(3);
      });
      $activity.appendChild(btn);
    });
  }

  function renderGrid() {
    $grid.innerHTML = '';
    LAYOUTS.forEach(l => {
      const a = document.createElement('a');
      a.className = 'layout-card';
      a.href = l.href;
      a.innerHTML = `
        <div class="layout-thumb"><img src="${l.thumb}" alt="${l.name}" onerror="this.style.display='none'"/></div>
        <div class="layout-name">${l.name}</div>
      `;
      $grid.appendChild(a);
    });
  }

  // ─── Breadcrumbs ────────────────────────────────────────────
  function makeCrumbItem(label, onClick) {
    const b = document.createElement('button');
    b.className = 'crumb-item';
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }
  function makeArrow() {
    const s = document.createElement('span');
    s.className = 'crumb-arrow';
    s.textContent = '↓';
    return s;
  }
  function renderCrumb2() {
    $crumb2.innerHTML = '';
    $crumb2.appendChild(makeCrumbItem('Main', () => showScreen(1)));
    $crumb2.appendChild(makeArrow());
    $crumb2.appendChild(makeCrumbItem(purposeLabel(), () => showScreen(2)));
    $crumb2.appendChild(makeArrow());
  }
  function renderCrumb3() {
    $crumb3.innerHTML = '';
    $crumb3.appendChild(makeCrumbItem('Main', () => showScreen(1)));
    $crumb3.appendChild(makeArrow());
    $crumb3.appendChild(makeCrumbItem(purposeLabel(), () => showScreen(2)));
    $crumb3.appendChild(makeArrow());
    $crumb3.appendChild(makeCrumbItem(activityLabel(), () => showScreen(3)));
    $crumb3.appendChild(makeArrow());
  }

  renderPurpose();
  </script>
</body>
</html>
