<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paysend Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    a.start-btn {
      padding: 16px 40px;
      background: #141414;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    a.start-btn:hover  { background: #333; }
    a.start-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <a class="start-btn" href="/templates">Start Building</a>
</body>
</html>
