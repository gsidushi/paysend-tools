<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Builder — New Hire</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @font-face {
      font-family: 'GT Standard';
      src: url('../fonts/GT-Standard-L-Standard-Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('../fonts/GT-Standard-L-Standard-Semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'GT Standard', sans-serif; background: #f0f0f0; color: #111; display: flex; flex-direction: column; }

    /* ── App header ── */
    .header {
      padding: 14px 24px; background: #fff; border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .header-logo { width: 28px; height: 28px; flex-shrink: 0; display: block; }
    .header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { font-size: 13px; color: #999; }

    /* ── Workspace ── */
    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 25vw;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Preview area ── */
    .preview-area {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 32px; gap: 12px; overflow: hidden;
    }
    .preview-wrapper {
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0,0,0,0.22);
      border-radius: 3px;
      flex-shrink: 0;
    }
    .preview-hint { font-size: 12px; color: #aaa; }

    /* ── Canvas (1080 × 1350 portrait) ── */
    #post-canvas {
      width: 1080px; height: 1350px;
      transform-origin: top left;
      font-family: 'GT Standard', sans-serif;
      background: var(--accent, #b75eff);
      position: relative;
      overflow: hidden;
    }

    /* Top-right logos */
    .top-logos {
      position: absolute;
      top: 41px; right: 41px;
      display: flex; align-items: center; gap: 20px;
      z-index: 3;
    }
    .top-logos .logo-paysend { height: 40px; width: auto; display: block; flex-shrink: 0; object-fit: contain; }

    /* Person photo area — anchored full-canvas-bottom, cutout */
    .person-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }
    .person-photo {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: auto;
      transform: translateY(var(--photo-offset, 0%)) scale(var(--photo-scale, 1));
      transform-origin: center bottom;
      display: block;
    }

    /* Bottom-left nameplate stack */
    .nameplate-stack {
      position: absolute;
      left: 41px; bottom: 41px;
      right: 41px;
      display: flex; flex-direction: column; gap: 2px;
      z-index: 2;
    }
    .nameplate-stack.hidden { display: none !important; }
    .np-welcome {
      background: #fff;
      padding: 10px 14px;
      align-self: flex-start;
      max-width: 998px;
    }
    .np-welcome p {
      font-size: 36px; font-weight: 600; color: #141414;
      line-height: 0.95; letter-spacing: -0.36px; white-space: pre-line;
    }
    .np-name {
      background: #fff;
      padding: 10px 14px;
      align-self: flex-start;
      max-width: 998px;
    }
    .np-name p {
      font-size: 120px; font-weight: 600; color: #141414;
      line-height: 0.9; letter-spacing: -1.2px;
      overflow-wrap: break-word;
    }

    /* ── Toggle switch + collapsible section ── */
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 20px; transition: background 0.2s; }
    .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle-switch input:checked + .toggle-slider { background: #141414; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); }
    .section-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .section-row .control-label { margin-bottom: 0; }
    .section-body { display: flex; flex-direction: column; gap: 10px; }
    .control-section.section-off .section-body { display: none; }
    .sub-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: 4px; display: block; }

    /* ── Controls ── */
    .controls {
      background: #fff;
      border-left: 1px solid #e8e8e8;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto;
    }
    .control-section { display: flex; flex-direction: column; gap: 6px; }
    .control-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.6px; color: #888;
    }
    .control-input, .control-textarea {
      width: 100%; padding: 9px 11px;
      border: 1px solid #e0e0e0; border-radius: 6px;
      font-size: 14px; font-family: inherit; color: #1a1a1a;
      background: #fafafa; transition: border-color 0.15s; resize: none;
    }
    .control-input:focus, .control-textarea:focus {
      outline: none; border-color: #17bff2; background: #fff;
    }
    .divider { height: 1px; background: #f0f0f0; margin: 2px 0; }

    /* Color palette */
    .color-palette { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .color-swatch {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.12s, border-color 0.12s; flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #141414; transform: scale(1.1); box-shadow: 0 0 0 1px #fff inset; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed #ddd; border-radius: 8px; padding: 12px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      min-height: 70px; display: flex; align-items: center; justify-content: center;
    }
    .upload-zone:hover { border-color: #17bff2; background: #f0fbff; }
    .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #aaa; font-size: 12px; }
    .upload-icon { font-size: 18px; line-height: 1; }
    .upload-hint { font-size: 11px; color: #ccc; }
    .upload-preview { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
    .upload-preview img { width: 100%; height: 60px; object-fit: cover; border-radius: 4px; }
    .remove-photo { font-size: 11px; color: #e94560; background: none; border: none; cursor: pointer; padding: 2px 4px; font-family: inherit; }
    .remove-photo:hover { text-decoration: underline; }

    /* Photo position slider */
    .position-slider-wrap { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .position-slider-wrap span { font-size: 11px; color: #999; flex-shrink: 0; width: 36px; text-align: center; }
    .position-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; background: #e0e0e0; border-radius: 2px; outline: none; cursor: pointer;
    }
    .position-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #141414; cursor: pointer; border: none; }
    .position-slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #141414; cursor: pointer; border: none; }

    /* Photo zoom controls */
    .zoom-control { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .zoom-label { font-size: 11px; color: #999; flex-shrink: 0; width: 36px; text-align: center; }
    .zoom-btn {
      width: 28px; height: 28px; border-radius: 4px;
      border: 1px solid #e0e0e0; background: #fafafa;
      font-size: 16px; font-weight: 600; line-height: 1; cursor: pointer;
      font-family: inherit; color: #141414;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.12s, border-color 0.12s;
    }
    .zoom-btn:hover:not(:disabled) { background: #f0f0f0; border-color: #141414; }
    .zoom-btn:active:not(:disabled) { transform: scale(0.95); }
    .zoom-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .zoom-value { font-size: 12px; color: #555; min-width: 44px; text-align: center; font-variant-numeric: tabular-nums; }

    /* Download */
    .download-btn {
      margin-top: auto; padding: 13px 20px;
      background: #141414; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }
    .download-btn:hover:not(:disabled) { background: #333; }
    .download-btn:active:not(:disabled) { transform: scale(0.98); }
    .download-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Auto bg-removal note ── */
    .bg-auto-note {
      margin-top: 8px; font-size: 11px; color: #888;
      line-height: 1.4; font-style: italic;
    }

    /* ── Background-removal overlay ── */
    .bg-overlay {
      position: fixed; inset: 0;
      background: rgba(20,20,20,0.68);
      display: none; align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
    }
    .bg-overlay.visible { display: flex; }
    .bg-overlay-inner {
      background: #1f1f1f; padding: 24px 32px; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      max-width: 360px; text-align: center;
    }
    .bg-overlay-spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2); border-top-color: #08ffce;
      animation: bg-spin 0.9s linear infinite;
    }
    @keyframes bg-spin { to { transform: rotate(360deg); } }
    .bg-overlay-title { font-size: 16px; font-weight: 600; }
    .bg-overlay-hint { font-size: 12px; color: #aaa; line-height: 1.4; }

    /* ── Responsive sidebar widths ── */
    @media (max-width: 1199px) { .workspace { grid-template-columns: 1fr 33vw; } }
    @media (max-width: 799px)  { .workspace { grid-template-columns: 1fr 40vw; } }
    @media (max-width: 499px) {
      html, body { height: auto; overflow: auto; }
      .workspace { display: flex; flex-direction: column; overflow: visible; height: auto; }
      .preview-area { padding: 0; overflow: visible; justify-content: flex-start; align-items: stretch; flex-shrink: 0; height: auto; }
      .preview-wrapper { width: 100vw !important; border-radius: 0; box-shadow: none; flex-shrink: 0; }
      .preview-hint { display: none; }
      .controls { border-left: none; border-top: 1px solid #e8e8e8; height: auto; overflow-y: visible; flex: none; }
    }
  </style>
</head>
<body>

  <div class="bg-overlay" id="bg-overlay" role="dialog" aria-live="polite">
    <div class="bg-overlay-inner">
      <div class="bg-overlay-spinner"></div>
      <div class="bg-overlay-title">Removing background…</div>
      <div class="bg-overlay-hint">First run may take 10–30 seconds while the model loads.</div>
    </div>
  </div>

  <header class="header">
    <a href="/" title="Back to layouts">
      <img class="header-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </a>
    <h1>Post Builder</h1>
    <p>1080 × 1350 New Hire</p>
  </header>

  <main class="workspace">

  <!-- ── Preview ── -->
  <div class="preview-area">
    <div class="preview-wrapper">
      <div id="post-canvas" style="--accent:#b75eff">

        <!-- Top-right Paysend wordmark -->
        <div class="top-logos">
          <img class="logo-paysend" src="/assets/logo-paysend-wordmark.svg" alt="Paysend" />
        </div>

        <!-- Person photo -->
        <div class="person-wrap">
          <img class="person-photo" id="person-photo" src="/assets/person_placeholder_alpha.png" alt="" />
        </div>

        <!-- Bottom-left: Welcome line + Name -->
        <div class="nameplate-stack" id="nameplate-stack">
          <div class="np-welcome"><p id="preview-welcome">Welcome our new&#10;Editorial Lead</p></div>
          <div class="np-name"><p id="preview-name">Full Name</p></div>
        </div>

      </div>
    </div>
    <p class="preview-hint">Preview scaled — exports 1080 × 1350</p>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">

    <!-- Accent color -->
    <div class="control-section">
      <label class="control-label">Background Color</label>
      <div class="color-palette" id="color-palette">
        <button class="color-swatch" data-color="#08ffce" style="background:#08ffce" title="Cyan"></button>
        <button class="color-swatch" data-color="#17bff2" style="background:#17bff2" title="Sky Blue"></button>
        <button class="color-swatch" data-color="#4a57c5" style="background:#4a57c5" title="Indigo"></button>
        <button class="color-swatch" data-color="#08c197" style="background:#08c197" title="Teal"></button>
        <button class="color-swatch" data-color="#a0eb31" style="background:#a0eb31" title="Lime"></button>
        <button class="color-swatch" data-color="#f7e43d" style="background:#f7e43d" title="Yellow"></button>
        <button class="color-swatch" data-color="#f7ab3d" style="background:#f7ab3d" title="Orange"></button>
        <button class="color-swatch" data-color="#ff574a" style="background:#ff574a" title="Red"></button>
        <button class="color-swatch active" data-color="#b75eff" style="background:#b75eff" title="Purple"></button>
        <button class="color-swatch" data-color="#fe94da" style="background:#fe94da" title="Pink"></button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Nameplate -->
    <div class="control-section">
      <div class="section-row">
        <label class="control-label">Nameplate</label>
        <label class="toggle-switch">
          <input type="checkbox" id="nameplate-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="section-body">
        <div>
          <label class="sub-label">Welcome Message</label>
          <textarea class="control-textarea" id="input-welcome" rows="2">Welcome our new
Editorial Lead</textarea>
        </div>
        <div>
          <label class="sub-label">Name</label>
          <input class="control-input" id="input-name" type="text" value="Full Name" />
        </div>
      </div>
    </div>

    <div class="control-section">
      <label class="control-label">Photo</label>
      <div class="upload-zone" id="person-zone">
        <div class="upload-placeholder">
          <span class="upload-icon">↑</span>
          <span>Click or drag</span>
          <span class="upload-hint">PNG, JPG, WEBP</span>
        </div>
        <div class="upload-preview" style="display:none">
          <img src="" alt="thumb" />
          <button class="remove-photo">Remove</button>
        </div>
      </div>
      <input type="file" accept="image/*" id="person-file" style="display:none" />
      <p class="bg-auto-note">Background is removed automatically on upload.</p>
    </div>

    <div class="control-section">
      <label class="control-label">Image Position</label>
      <div class="position-slider-wrap">
        <span>Top</span>
        <input type="range" class="position-slider" id="photo-position-slider" min="0" max="100" value="50" />
        <span>Bottom</span>
      </div>
      <div class="zoom-control" data-zoom-target="person">
        <span class="zoom-label">Zoom</span>
        <button type="button" class="zoom-btn" data-dir="-1" aria-label="Zoom out">−</button>
        <span class="zoom-value">100%</span>
        <button type="button" class="zoom-btn" data-dir="1" aria-label="Zoom in">+</button>
      </div>
    </div>

    <button class="download-btn" id="download-btn">Download PNG</button>

  </div>
  </main>

  <script>
  const MAX_EDGE = 2400;
  const SMALL_FILE_BYTES = 400 * 1024;

  async function fileToOptimizedSrc(file) {
    if (file.type === 'image/svg+xml' || file.size <= SMALL_FILE_BYTES) {
      return URL.createObjectURL(file);
    }
    try {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, MAX_EDGE / Math.max(bitmap.width, bitmap.height));
      if (scale === 1) { bitmap.close(); return URL.createObjectURL(file); }
      const w = Math.round(bitmap.width * scale);
      const h = Math.round(bitmap.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      bitmap.close();
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.88));
      return URL.createObjectURL(blob);
    } catch {
      return URL.createObjectURL(file);
    }
  }

  const BG_MAX_EDGE = 2000;
  let bgRemoveFn = null;
  async function loadBgRemoval() {
    if (bgRemoveFn) return bgRemoveFn;
    const mod = await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm');
    bgRemoveFn = mod.removeBackground || mod.default?.removeBackground || mod.default;
    return bgRemoveFn;
  }
  async function fileToDownscaledBlob(file, maxEdge) {
    const bitmap = await createImageBitmap(file);
    const scale = Math.min(1, maxEdge / Math.max(bitmap.width, bitmap.height));
    const w = Math.max(1, Math.round(bitmap.width * scale));
    const h = Math.max(1, Math.round(bitmap.height * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
    bitmap.close();
    return await new Promise(res => canvas.toBlob(res, 'image/png'));
  }

  const bgOverlay = document.getElementById('bg-overlay');
  const showBgOverlay = () => bgOverlay.classList.add('visible');
  const hideBgOverlay = () => bgOverlay.classList.remove('visible');

  async function removeImageBackground(file) {
    showBgOverlay();
    try {
      const remove = await loadBgRemoval();
      const inputBlob = await fileToDownscaledBlob(file, BG_MAX_EDGE);
      const resultBlob = await remove(inputBlob);
      return URL.createObjectURL(resultBlob);
    } catch (err) {
      console.error('Background removal failed, falling back to original image:', err);
      return await fileToOptimizedSrc(file);
    } finally {
      hideBgOverlay();
    }
  }

  const canvas = document.getElementById('post-canvas');

  function bindText(inputId, previewId) {
    const input = document.getElementById(inputId);
    const preview = document.getElementById(previewId);
    if (!input || !preview) return;
    input.addEventListener('input', () => { preview.textContent = input.value; });
  }
  bindText('input-name', 'preview-name');
  bindText('input-welcome', 'preview-welcome');

  // ── Name auto-fit ────────────────────────────────────────
  const NAME_BASE_SIZE = 120;
  const NAME_MIN_SIZE = 40;
  const CANVAS_SIDE_PAD = 41;
  const NP_NAME_PAD_X = 14;
  function longestWordWidth(el) {
    const text = (el.textContent || '').trim();
    if (!text) return 0;
    const words = text.split(/\s+/);
    const cs = getComputedStyle(el);
    const probe = document.createElement('span');
    probe.style.cssText = 'position:absolute;left:-99999px;top:-99999px;visibility:hidden;white-space:nowrap;';
    probe.style.fontFamily = cs.fontFamily;
    probe.style.fontSize = cs.fontSize;
    probe.style.fontWeight = cs.fontWeight;
    probe.style.fontStyle = cs.fontStyle;
    probe.style.letterSpacing = cs.letterSpacing;
    probe.style.textTransform = cs.textTransform;
    document.body.appendChild(probe);
    let max = 0;
    for (const w of words) {
      probe.textContent = w;
      if (probe.offsetWidth > max) max = probe.offsetWidth;
    }
    document.body.removeChild(probe);
    return max;
  }
  function fitName() {
    const el = document.getElementById('preview-name');
    if (!el) return;
    const cvs = document.getElementById('post-canvas');
    const available = cvs.clientWidth - 2 * CANVAS_SIDE_PAD - 2 * NP_NAME_PAD_X;
    let size = NAME_BASE_SIZE;
    el.style.fontSize = size + 'px';
    for (let i = 0; i < 50; i++) {
      if (size <= NAME_MIN_SIZE) break;
      if (longestWordWidth(el) <= available + 0.5) break;
      size -= 2;
      el.style.fontSize = size + 'px';
    }
  }
  document.getElementById('input-name').addEventListener('input', fitName);

  // Toggles
  function syncSectionOff(cb) {
    const section = cb.closest('.control-section');
    if (!section) return;
    section.classList.toggle('section-off', !cb.checked);
  }
  function bindToggle(toggleId, targetEl) {
    const cb = document.getElementById(toggleId);
    const apply = () => {
      targetEl.classList.toggle('hidden', !cb.checked);
      syncSectionOff(cb);
    };
    cb.addEventListener('change', apply);
    apply();
  }
  bindToggle('nameplate-toggle', document.getElementById('nameplate-stack'));

  // Accent color palette
  document.querySelectorAll('#color-palette .color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      canvas.style.setProperty('--accent', sw.dataset.color);
      document.querySelectorAll('#color-palette .color-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
  });

  // Photo position slider
  const photoEl = document.getElementById('person-photo');
  const slider = document.getElementById('photo-position-slider');
  function applyPhotoPosition() {
    const offset = (parseFloat(slider.value) - 50) * 0.3;
    canvas.style.setProperty('--photo-offset', offset + '%');
  }
  slider.addEventListener('input', applyPhotoPosition);
  applyPhotoPosition();

  // Photo zoom
  const ZOOM_MIN = 0.5, ZOOM_MAX = 2.5, ZOOM_STEP = 0.1;
  const personZoom = { value: 1 };
  const zoomControl = document.querySelector('[data-zoom-target="person"]');
  const zoomValueEl = zoomControl.querySelector('.zoom-value');
  const zoomDecBtn = zoomControl.querySelector('[data-dir="-1"]');
  const zoomIncBtn = zoomControl.querySelector('[data-dir="1"]');
  function applyZoom() {
    canvas.style.setProperty('--photo-scale', personZoom.value);
    zoomValueEl.textContent = Math.round(personZoom.value * 100) + '%';
    zoomDecBtn.disabled = personZoom.value <= ZOOM_MIN + 0.001;
    zoomIncBtn.disabled = personZoom.value >= ZOOM_MAX - 0.001;
  }
  zoomDecBtn.addEventListener('click', () => {
    personZoom.value = Math.max(ZOOM_MIN, +(personZoom.value - ZOOM_STEP).toFixed(2));
    applyZoom();
  });
  zoomIncBtn.addEventListener('click', () => {
    personZoom.value = Math.min(ZOOM_MAX, +(personZoom.value + ZOOM_STEP).toFixed(2));
    applyZoom();
  });
  applyZoom();

  // Person photo upload
  (function setupPersonUpload() {
    const zone = document.getElementById('person-zone');
    const fileInput = document.getElementById('person-file');
    const placeholder = zone.querySelector('.upload-placeholder');
    const preview = zone.querySelector('.upload-preview');
    const thumb = preview.querySelector('img');
    const removeBtn = preview.querySelector('.remove-photo');

    function setPhoto(src) {
      photoEl.src = src;
      thumb.src = src;
      placeholder.style.display = 'none';
      preview.style.display = 'flex';
    }
    function clearPhoto() {
      photoEl.src = '/assets/person_placeholder_alpha.png';
      fileInput.value = '';
      placeholder.style.display = 'flex';
      preview.style.display = 'none';
    }
    async function ingest(file) {
      const src = await removeImageBackground(file);
      setPhoto(src);
    }
    zone.addEventListener('click', e => {
      if (e.target === removeBtn || removeBtn.contains(e.target)) return;
      fileInput.click();
    });
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#141414'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
    zone.addEventListener('drop', async e => {
      e.preventDefault(); zone.style.borderColor = '';
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) ingest(f);
    });
    fileInput.addEventListener('change', async () => {
      const f = fileInput.files[0];
      if (f) ingest(f);
    });
    removeBtn.addEventListener('click', e => { e.stopPropagation(); clearPhoto(); });
  })();

  // Responsive preview scaling
  (function scalePreview() {
    const CANVAS_W = 1080, CANVAS_H = 1350;
    const PREVIEW_PAD = 64;
    const HEADER_H = 60;
    const wrapper = document.querySelector('.preview-wrapper');
    const cvs = document.getElementById('post-canvas');

    function update() {
      const w = window.innerWidth, h = window.innerHeight;
      let sidebarFrac;
      if (w < 500)       sidebarFrac = 0;
      else if (w < 800)  sidebarFrac = 0.40;
      else if (w < 1200) sidebarFrac = 0.33;
      else               sidebarFrac = 0.25;

      let availW, availH;
      if (w < 500) {
        availW = w;
        availH = Infinity;
      } else {
        availW = w * (1 - sidebarFrac) - PREVIEW_PAD;
        availH = h - HEADER_H - 80;
      }
      const scale = Math.min(availW / CANVAS_W, availH / CANVAS_H);
      wrapper.style.width  = Math.round(CANVAS_W * scale) + 'px';
      wrapper.style.height = Math.round(CANVAS_H * scale) + 'px';
      cvs.style.transform  = `scale(${scale})`;
    }
    update();
    window.addEventListener('resize', update);
  })();

  // Download
  document.getElementById('download-btn').addEventListener('click', async () => {
    const btn = document.getElementById('download-btn');
    btn.textContent = 'Exporting…'; btn.disabled = true;
    try {
      const result = await html2canvas(canvas, {
        scale: 1, width: 1080, height: 1350,
        useCORS: true, allowTaint: true, backgroundColor: null,
        logging: false
      });
      const link = document.createElement('a');
      link.download = 'paysend-new-hire.png';
      link.href = result.toDataURL('image/png');
      link.click();
    } catch (err) {
      console.error('Download failed:', err);
    } finally {
      btn.textContent = 'Download PNG'; btn.disabled = false;
    }
  });

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => fitName());
  } else {
    fitName();
  }
  </script>
</body>
