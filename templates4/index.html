<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Builder — Event Portrait (Pattern)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @font-face {
      font-family: 'GT Standard';
      src: url('../fonts/GT-Standard-L-Standard-Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('../fonts/GT-Standard-L-Standard-Semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'GT Standard', sans-serif; background: #f0f0f0; color: #111; display: flex; flex-direction: column; }

    .header {
      padding: 14px 24px; background: #fff; border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .header-logo { width: 28px; height: 28px; flex-shrink: 0; display: block; }
    .header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { font-size: 13px; color: #999; }

    .workspace { flex: 1; display: grid; grid-template-columns: 1fr 25vw; min-height: 0; overflow: hidden; }
    .preview-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; gap: 12px; overflow: hidden; }
    .preview-wrapper { overflow: hidden; box-shadow: 0 8px 48px rgba(0,0,0,0.22); border-radius: 3px; flex-shrink: 0; }
    .preview-hint { font-size: 12px; color: #aaa; }

    /* ── Canvas (1080 × 1350) ── */
    #post-canvas {
      width: 1080px; height: 1350px;
      transform-origin: top left;
      font-family: 'GT Standard', sans-serif;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }

    /* Pattern background */
    .bg-pattern {
      position: absolute;
      top: 0; left: 0; right: 0;
      bottom: 0;
      background: #0a0a0a url('/assets/pattern-1.png') center center / cover no-repeat;
    }

    /* Top-left: Paysend wordmark + divider + partner logo */
    .top-logos {
      position: absolute;
      top: 41px; left: 41px;
      display: flex; align-items: center; gap: 20px;
      z-index: 3;
    }
    .top-logos .logo-paysend,
    .top-logos .logo-partner {
      height: 44px; width: auto; max-width: 220px;
      display: block; flex-shrink: 0; object-fit: contain;
      filter: brightness(0) invert(1);
    }
    .top-logos .logo-partner { filter: none; }
    .top-logos .logo-divider { width: 2px; height: 44px; background: rgba(255,255,255,0.55); flex-shrink: 0; }
    .top-logos .logo-partner.hidden,
    .top-logos .logo-divider.hidden { display: none !important; }

    /* Top-right: stacked date / location badges */
    .top-badges {
      position: absolute;
      top: 41px; right: 41px;
      display: flex; flex-direction: column; gap: 8px;
      align-items: flex-end;
      z-index: 3;
    }
    .top-badges.hidden { display: none !important; }
    .badge-pill {
      background: #fff;
      padding: 12px 18px;
      display: inline-flex; align-items: center; gap: 12px;
      border-radius: 4px;
    }
    .badge-pill .icon { width: 28px; height: 28px; color: #141414; flex-shrink: 0; }
    .badge-pill .icon svg { width: 100%; height: 100%; display: block; }
    .badge-pill span {
      font-size: 30px; font-weight: 400; color: #141414;
      line-height: 1; letter-spacing: -0.15px; white-space: nowrap;
    }

    /* Bottom block: subheadline + headline */
    .bottom-block {
      position: absolute;
      left: 41px; bottom: 41px;
      max-width: calc(100% - 82px);
      display: flex; flex-direction: column; gap: 12px;
      align-items: flex-start;
      z-index: 3;
    }
    /* In split mode accent wraps tightly around tag + headline. */
    #post-canvas.mode-split .bottom-block {
      background: var(--accent, #08ffce);
    }
    .subheadline {
      background: #fff;
      padding: 10px 14px;
      align-self: flex-start;
      max-width: 998px;
    }
    .subheadline.hidden { display: none !important; }
    .subheadline p {
      font-size: 32px; font-weight: 600; color: #141414;
      line-height: 1; letter-spacing: -0.32px; white-space: nowrap;
    }
    .headline { max-width: 998px; }
    .headline.hidden { display: none !important; }
    .headline p {
      font-size: 124px; font-weight: 600;
      color: #fff;
      line-height: 0.92; letter-spacing: -1.24px;
      white-space: pre-line; overflow-wrap: break-word;
    }
    /* In split mode the headline sits on accent → use text-on-accent */
    #post-canvas.mode-split .headline p { color: var(--text-on-accent, #141414); }

    /* ── Toggle switch + collapsible section ── */
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 20px; transition: background 0.2s; }
    .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle-switch input:checked + .toggle-slider { background: #141414; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); }
    .section-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .section-row .control-label { margin-bottom: 0; }
    .section-body { display: flex; flex-direction: column; gap: 10px; }
    .control-section.section-off .section-body { display: none; }
    .sub-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: 4px; display: block; }

    .controls {
      background: #fff; border-left: 1px solid #e8e8e8;
      padding: 24px 20px; display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto;
    }
    .control-section { display: flex; flex-direction: column; gap: 6px; }
    .control-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #888; }
    .control-input, .control-textarea {
      width: 100%; padding: 9px 11px;
      border: 1px solid #e0e0e0; border-radius: 6px;
      font-size: 14px; font-family: inherit; color: #1a1a1a;
      background: #fafafa; transition: border-color 0.15s; resize: none;
    }
    .control-input:focus, .control-textarea:focus { outline: none; border-color: #17bff2; background: #fff; }
    .divider { height: 1px; background: #f0f0f0; margin: 2px 0; }

    /* State segmented control */
    .seg-control {
      display: flex; gap: 6px; background: #f5f5f5; padding: 4px; border-radius: 8px;
    }
    .seg-btn {
      flex: 1; padding: 8px 10px; font-size: 13px; font-weight: 600;
      font-family: inherit; color: #555; background: transparent;
      border: none; border-radius: 6px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .seg-btn.active { background: #141414; color: #fff; }
    .seg-btn:not(.active):hover { color: #141414; }

    .color-palette { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .color-swatch {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.12s, border-color 0.12s; flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #141414; transform: scale(1.1); box-shadow: 0 0 0 1px #fff inset; }

    .upload-zone {
      border: 2px dashed #ddd; border-radius: 8px; padding: 12px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      min-height: 70px; display: flex; align-items: center; justify-content: center;
    }
    .upload-zone:hover { border-color: #17bff2; background: #f0fbff; }
    .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #aaa; font-size: 12px; }
    .upload-icon { font-size: 18px; line-height: 1; }
    .upload-hint { font-size: 11px; color: #ccc; }
    .upload-preview { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
    .upload-preview img { width: 100%; height: 60px; object-fit: contain; background: #1a1a1a; border-radius: 4px; }
    .remove-photo { font-size: 11px; color: #e94560; background: none; border: none; cursor: pointer; padding: 2px 4px; font-family: inherit; }
    .remove-photo:hover { text-decoration: underline; }

    .download-btn {
      margin-top: auto; padding: 13px 20px;
      background: #141414; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }
    .download-btn:hover:not(:disabled) { background: #333; }
    .download-btn:active:not(:disabled) { transform: scale(0.98); }
    .download-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 1199px) { .workspace { grid-template-columns: 1fr 33vw; } }
    @media (max-width: 799px)  { .workspace { grid-template-columns: 1fr 40vw; } }
    @media (max-width: 499px) {
      html, body { height: auto; overflow: auto; }
      .workspace { display: flex; flex-direction: column; overflow: visible; height: auto; }
      .preview-area { padding: 0; overflow: visible; justify-content: flex-start; align-items: stretch; flex-shrink: 0; height: auto; }
      .preview-wrapper { width: 100vw !important; border-radius: 0; box-shadow: none; flex-shrink: 0; }
      .preview-hint { display: none; }
      .controls { border-left: none; border-top: 1px solid #e8e8e8; height: auto; overflow-y: visible; flex: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" title="Back to layouts">
      <img class="header-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </a>
    <h1>Post Builder</h1>
    <p>1080 × 1350 Event Portrait</p>
  </header>

  <main class="workspace">

  <div class="preview-area">
    <div class="preview-wrapper">
      <div id="post-canvas" class="mode-pattern" style="--accent:#08ffce">

        <div class="bg-pattern"></div>

        <div class="top-logos">
          <img class="logo-paysend" src="/assets/logo-paysend-wordmark.svg" alt="Paysend" />
          <div class="logo-divider" id="divider-1"></div>
          <img class="logo-partner" id="logo-partner-1" src="/assets/partner-logo.png" alt="Partner" />
        </div>

        <div class="top-badges" id="top-badges">
          <div class="badge-pill">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </span>
            <span id="preview-date">January 19–21, 2026</span>
          </div>
          <div class="badge-pill">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </span>
            <span id="preview-location">Barcelona, Spain</span>
          </div>
        </div>

        <div class="bottom-block">
          <div class="subheadline" id="subheadline">
            <p id="preview-subheadline">Discover how Paysend can power your business!</p>
          </div>
          <div class="headline" id="headline">
            <p id="preview-headline">Level up your payments game with Paysend at ICE Barcelona!</p>
          </div>
        </div>

      </div>
    </div>
    <p class="preview-hint">Preview scaled — exports 1080 × 1350</p>
  </div>

  <div class="controls">

    <!-- Mode switch -->
    <div class="control-section">
      <label class="control-label">Style</label>
      <div class="seg-control" id="mode-switch">
        <button class="seg-btn active" data-mode="pattern" type="button">Pattern</button>
        <button class="seg-btn" data-mode="split" type="button">Pattern + Color</button>
      </div>
    </div>

    <!-- Accent color (only active in split mode) -->
    <div class="control-section" id="accent-section">
      <label class="control-label">Accent Color</label>
      <div class="color-palette" id="color-palette">
        <button class="color-swatch active" data-color="#08ffce" style="background:#08ffce" title="Cyan"></button>
        <button class="color-swatch" data-color="#17bff2" style="background:#17bff2" title="Sky Blue"></button>
        <button class="color-swatch" data-color="#4a57c5" style="background:#4a57c5" title="Indigo"></button>
        <button class="color-swatch" data-color="#08c197" style="background:#08c197" title="Teal"></button>
        <button class="color-swatch" data-color="#a0eb31" style="background:#a0eb31" title="Lime"></button>
        <button class="color-swatch" data-color="#f7e43d" style="background:#f7e43d" title="Yellow"></button>
        <button class="color-swatch" data-color="#f7ab3d" style="background:#f7ab3d" title="Orange"></button>
        <button class="color-swatch" data-color="#ff574a" style="background:#ff574a" title="Red"></button>
        <button class="color-swatch" data-color="#b75eff" style="background:#b75eff" title="Purple"></button>
        <button class="color-swatch" data-color="#fe94da" style="background:#fe94da" title="Pink"></button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Top badges -->
    <div class="control-section">
      <div class="section-row">
        <label class="control-label">Date / Location</label>
        <label class="toggle-switch">
          <input type="checkbox" id="badges-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="section-body">
        <div>
          <label class="sub-label">Date</label>
          <input class="control-input" id="input-date" type="text" value="January 19–21, 2026" />
        </div>
        <div>
          <label class="sub-label">Location</label>
          <input class="control-input" id="input-location" type="text" value="Barcelona, Spain" />
        </div>
      </div>
    </div>

    <!-- Partner logo -->
    <div class="control-section">
      <div class="section-row">
        <label class="control-label">Partner Logo</label>
        <label class="toggle-switch">
          <input type="checkbox" id="partner-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="section-body">
        <div class="upload-zone" id="partner-zone">
          <div class="upload-placeholder">
            <span class="upload-icon">↑</span>
            <span>Upload logo</span>
            <span class="upload-hint">PNG, SVG, JPG</span>
          </div>
          <div class="upload-preview" style="display:none">
            <img src="" alt="thumb" />
            <button class="remove-photo">Remove</button>
          </div>
        </div>
        <input type="file" accept="image/*,.svg" id="partner-file" style="display:none" />
      </div>
    </div>

    <div class="divider"></div>

    <!-- Subheadline -->
    <div class="control-section">
      <div class="section-row">
        <label class="control-label">Subheadline</label>
        <label class="toggle-switch">
          <input type="checkbox" id="subheadline-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="section-body">
        <input class="control-input" id="input-subheadline" type="text" value="Discover how Paysend can power your business!" />
      </div>
    </div>

    <!-- Headline -->
    <div class="control-section">
      <div class="section-row">
        <label class="control-label">Headline</label>
        <label class="toggle-switch">
          <input type="checkbox" id="headline-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="section-body">
        <textarea class="control-textarea" id="input-headline" rows="4">Level up your payments game with Paysend at ICE Barcelona!</textarea>
      </div>
    </div>

    <button class="download-btn" id="download-btn">Download PNG</button>

  </div>
  </main>

  <script>
  const MAX_EDGE = 2400;
  const SMALL_FILE_BYTES = 400 * 1024;
  async function fileToOptimizedSrc(file) {
    if (file.type === 'image/svg+xml' || file.size <= SMALL_FILE_BYTES) {
      return URL.createObjectURL(file);
    }
    try {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, MAX_EDGE / Math.max(bitmap.width, bitmap.height));
      if (scale === 1) { bitmap.close(); return URL.createObjectURL(file); }
      const w = Math.round(bitmap.width * scale);
      const h = Math.round(bitmap.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      bitmap.close();
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.88));
      return URL.createObjectURL(blob);
    } catch { return URL.createObjectURL(file); }
  }

  const canvas = document.getElementById('post-canvas');

  function bindText(inputId, previewId) {
    const input = document.getElementById(inputId);
    const preview = document.getElementById(previewId);
    if (!input || !preview) return;
    input.addEventListener('input', () => { preview.textContent = input.value; });
  }
  bindText('input-date', 'preview-date');
  bindText('input-location', 'preview-location');
  bindText('input-subheadline', 'preview-subheadline');
  bindText('input-headline', 'preview-headline');

  // Headline auto-fit (longest word must fit)
  const HL_BASE = 124;
  const HL_MIN = 56;
  const CANVAS_PAD_X = 41;
  function longestWordWidth(el) {
    const text = (el.textContent || '').trim();
    if (!text) return 0;
    const words = text.split(/\s+/);
    const cs = getComputedStyle(el);
    const probe = document.createElement('span');
    probe.style.cssText = 'position:absolute;left:-99999px;top:-99999px;visibility:hidden;white-space:nowrap;';
    probe.style.fontFamily = cs.fontFamily;
    probe.style.fontSize = cs.fontSize;
    probe.style.fontWeight = cs.fontWeight;
    probe.style.fontStyle = cs.fontStyle;
    probe.style.letterSpacing = cs.letterSpacing;
    probe.style.textTransform = cs.textTransform;
    document.body.appendChild(probe);
    let max = 0;
    for (const w of words) { probe.textContent = w; if (probe.offsetWidth > max) max = probe.offsetWidth; }
    document.body.removeChild(probe);
    return max;
  }
  function fitHeadline() {
    const el = document.getElementById('preview-headline');
    if (!el) return;
    const cvs = document.getElementById('post-canvas');
    const available = cvs.clientWidth - 2 * CANVAS_PAD_X;
    let size = HL_BASE;
    el.style.fontSize = size + 'px';
    for (let i = 0; i < 50; i++) {
      if (size <= HL_MIN) break;
      if (longestWordWidth(el) <= available + 0.5) break;
      size -= 2;
      el.style.fontSize = size + 'px';
    }
  }
  document.getElementById('input-headline').addEventListener('input', fitHeadline);

  // Toggles
  function syncSectionOff(cb) {
    const section = cb.closest('.control-section');
    if (!section) return;
    section.classList.toggle('section-off', !cb.checked);
  }
  function bindToggle(toggleId, targetEl) {
    const cb = document.getElementById(toggleId);
    const apply = () => {
      targetEl.classList.toggle('hidden', !cb.checked);
      syncSectionOff(cb);
    };
    cb.addEventListener('change', apply);
    apply();
  }
  bindToggle('badges-toggle', document.getElementById('top-badges'));
  bindToggle('subheadline-toggle', document.getElementById('subheadline'));
  bindToggle('headline-toggle', document.getElementById('headline'));

  // Partner toggle (logo + divider)
  (function bindPartnerToggle() {
    const cb = document.getElementById('partner-toggle');
    const logo = document.getElementById('logo-partner-1');
    const divider = document.getElementById('divider-1');
    const apply = () => {
      logo.classList.toggle('hidden', !cb.checked);
      divider.classList.toggle('hidden', !cb.checked);
      syncSectionOff(cb);
    };
    cb.addEventListener('change', apply);
    apply();
  })();

  // Partner logo upload
  (function setupLogoUpload() {
    const zone = document.getElementById('partner-zone');
    const fileInput = document.getElementById('partner-file');
    const img = document.getElementById('logo-partner-1');
    const placeholder = zone.querySelector('.upload-placeholder');
    const preview = zone.querySelector('.upload-preview');
    const thumb = preview.querySelector('img');
    const removeBtn = preview.querySelector('.remove-photo');

    async function setSrc(src) {
      img.src = src; thumb.src = src;
      placeholder.style.display = 'none';
      preview.style.display = 'flex';
    }
    function clearSrc() {
      img.src = '/assets/partner-logo.png';
      fileInput.value = '';
      placeholder.style.display = 'flex';
      preview.style.display = 'none';
    }
    zone.addEventListener('click', e => {
      if (e.target === removeBtn || removeBtn.contains(e.target)) return;
      fileInput.click();
    });
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#141414'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
    zone.addEventListener('drop', async e => {
      e.preventDefault(); zone.style.borderColor = '';
      const f = e.dataTransfer.files[0];
      if (f) setSrc(await fileToOptimizedSrc(f));
    });
    fileInput.addEventListener('change', async () => {
      const f = fileInput.files[0];
      if (f) setSrc(await fileToOptimizedSrc(f));
    });
    removeBtn.addEventListener('click', e => { e.stopPropagation(); clearSrc(); });
  })();

  // Mode switch
  const modeSwitch = document.getElementById('mode-switch');
  const accentSection = document.getElementById('accent-section');
  function applyMode(mode) {
    canvas.classList.remove('mode-pattern', 'mode-split');
    canvas.classList.add('mode-' + mode);
    modeSwitch.querySelectorAll('.seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    accentSection.style.display = mode === 'split' ? '' : 'none';
  }
  modeSwitch.querySelectorAll('.seg-btn').forEach(b => {
    b.addEventListener('click', () => applyMode(b.dataset.mode));
  });
  applyMode('pattern');

  // Color palette
  const DARK_ACCENT = new Set(['#4a57c5']);
  document.querySelectorAll('#color-palette .color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      canvas.style.setProperty('--accent', sw.dataset.color);
      canvas.style.setProperty('--text-on-accent', DARK_ACCENT.has(sw.dataset.color) ? '#fff' : '#141414');
      document.querySelectorAll('#color-palette .color-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
  });

  // Preview scaling
  (function scalePreview() {
    const CANVAS_W = 1080, CANVAS_H = 1350;
    const PREVIEW_PAD = 64; const HEADER_H = 60;
    const wrapper = document.querySelector('.preview-wrapper');
    const cvs = document.getElementById('post-canvas');
    function update() {
      const w = window.innerWidth, h = window.innerHeight;
      let sidebarFrac;
      if (w < 500) sidebarFrac = 0;
      else if (w < 800) sidebarFrac = 0.40;
      else if (w < 1200) sidebarFrac = 0.33;
      else sidebarFrac = 0.25;
      let availW, availH;
      if (w < 500) { availW = w; availH = Infinity; }
      else { availW = w * (1 - sidebarFrac) - PREVIEW_PAD; availH = h - HEADER_H - 80; }
      const scale = Math.min(availW / CANVAS_W, availH / CANVAS_H);
      wrapper.style.width = Math.round(CANVAS_W * scale) + 'px';
      wrapper.style.height = Math.round(CANVAS_H * scale) + 'px';
      cvs.style.transform = `scale(${scale})`;
    }
    update();
    window.addEventListener('resize', update);
  })();

  // Download
  document.getElementById('download-btn').addEventListener('click', async () => {
    const btn = document.getElementById('download-btn');
    btn.textContent = 'Exporting…'; btn.disabled = true;
    try {
      const result = await html2canvas(canvas, {
        scale: 1, width: 1080, height: 1350,
        useCORS: true, allowTaint: true, backgroundColor: null, logging: false
      });
      const link = document.createElement('a');
      link.download = 'paysend-event-portrait.png';
      link.href = result.toDataURL('image/png');
      link.click();
    } catch (err) { console.error('Download failed:', err); }
    finally { btn.textContent = 'Download PNG'; btn.disabled = false; }
  });

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => fitHeadline());
  } else { fitHeadline(); }
  </script>
</body>
</html>
