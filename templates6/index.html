<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Builder — Milestone</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @font-face {
      font-family: 'GT Standard';
      src: url('../fonts/GT-Standard-L-Standard-Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'GT Standard';
      src: url('../fonts/GT-Standard-L-Standard-Semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'GT Standard', sans-serif; background: #f0f0f0; color: #111; display: flex; flex-direction: column; }

    .header {
      padding: 14px 24px; background: #fff; border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .header-logo { width: 28px; height: 28px; flex-shrink: 0; display: block; }
    .header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { font-size: 13px; color: #999; }

    .workspace { flex: 1; display: grid; grid-template-columns: 1fr 25vw; min-height: 0; overflow: hidden; }
    .preview-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; gap: 12px; overflow: hidden; }
    .preview-wrapper { overflow: hidden; box-shadow: 0 8px 48px rgba(0,0,0,0.22); border-radius: 3px; flex-shrink: 0; }
    .preview-hint { font-size: 12px; color: #aaa; }

    /* ── Canvas (1080 × 1350) ── */
    #post-canvas {
      width: 1080px; height: 1350px;
      transform-origin: top left;
      font-family: 'GT Standard', sans-serif;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      --split-top: 675px;
    }

    /* Layered backgrounds — visibility driven by .variant-X on the canvas */
    .bg-solid {
      position: absolute; inset: 0;
      background: var(--accent, #ff574a);
      display: none;
    }
    .bg-photo {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 34%;
      background: #333 center/cover no-repeat;
      display: none;
    }
    .bg-dark-full {
      position: absolute; inset: 0;
      background: #0a0a0a;
      display: none;
    }
    .bg-pattern-strip-bottom {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 45%;
      background: #0a0a0a url('/assets/pattern-1.png') center / cover no-repeat;
      display: none;
    }
    .bg-pattern-strip-top {
      position: absolute; left: 0; right: 0; top: 0;
      height: 50%;
      background: #0a0a0a url('/assets/pattern-1.png') center / cover no-repeat;
      display: none;
    }
    .bg-dark-bottom {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 50%;
      background: #0a0a0a;
      display: none;
    }
    .bg-pattern-full {
      position: absolute; inset: 0;
      background: #0a0a0a url('/assets/pattern-1.png') center / cover no-repeat;
      display: none;
    }

    /* Variant A — Solid accent bg + photo strip on right */
    #post-canvas.variant-solid .bg-solid,
    #post-canvas.variant-solid .bg-photo { display: block; }
    /* Variant B — Full dark + pattern strip at bottom */
    #post-canvas.variant-dark .bg-dark-full,
    #post-canvas.variant-dark .bg-pattern-strip-bottom { display: block; }
    /* Variant C — Pattern top, dark bottom */
    #post-canvas.variant-split .bg-pattern-strip-top,
    #post-canvas.variant-split .bg-dark-bottom { display: block; }
    /* Variant D — Full pattern */
    #post-canvas.variant-pattern .bg-pattern-full { display: block; }

    /* Top-left Paysend wordmark (white) */
    .top-brand {
      position: absolute; top: 41px; left: 41px;
      z-index: 3; display: flex; align-items: center;
    }
    .top-brand .logo-paysend {
      height: 44px; width: auto;
      filter: brightness(0) invert(1);
    }
    /* In the solid variant the brand sits at the bottom-left instead. */
    #post-canvas.variant-solid .top-brand { display: none; }

    /* News tag top-right */
    .news-tag {
      position: absolute; top: 41px; right: 41px;
      background: #fff; padding: 8px 14px;
      z-index: 3;
    }
    .news-tag.hidden { display: none !important; }
    .news-tag span {
      font-size: 20px; font-weight: 600; color: #141414;
      line-height: 1; letter-spacing: -0.1px; white-space: nowrap;
    }
    /* In solid variant, no news tag (design shows none) */
    #post-canvas.variant-solid .news-tag { display: none; }

    /* Headline */
    .headline {
      position: absolute;
      left: 41px;
      z-index: 2;
      max-width: 998px;
    }
    .headline.hidden { display: none !important; }
    .headline p {
      font-size: 108px; font-weight: 600;
      color: #fff;
      line-height: 0.95; letter-spacing: -1.08px;
      white-space: pre-line; overflow-wrap: break-word;
    }
    /* Variant-specific headline placement & color */
    #post-canvas.variant-solid .headline {
      top: 137px;
      right: calc(34% + 41px); /* keep clear of photo strip */
      color: var(--text-on-accent, #141414);
    }
    #post-canvas.variant-solid .headline p {
      color: var(--text-on-accent, #141414);
    }
    /* Highlighted inline effect on first 2 lines — applied via .hl span */
    #post-canvas.variant-solid .headline p .hl {
      background: #fff;
      padding: 0 8px;
      color: var(--accent, #ff574a);
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }
    #post-canvas.variant-dark .headline { top: 206px; right: 41px; }
    #post-canvas.variant-split .headline { top: 760px; right: 41px; }
    #post-canvas.variant-pattern .headline { top: 63px; right: 41px; }

    /* Body copy */
    .body-block {
      position: absolute;
      left: 41px;
      z-index: 2;
      max-width: 740px;
    }
    .body-block.hidden { display: none !important; }
    .body-block p {
      font-size: 22px; font-weight: 400;
      color: #fff;
      line-height: 1.3; letter-spacing: -0.1px;
      white-space: pre-line;
    }
    #post-canvas.variant-solid .body-block {
      top: 700px;
      right: calc(34% + 41px);
      max-width: none;
    }
    #post-canvas.variant-solid .body-block p {
      color: var(--text-on-accent, #141414);
    }
    #post-canvas.variant-dark .body-block { top: 600px; right: 41px; max-width: 740px; }
    #post-canvas.variant-split .body-block { top: 1190px; right: 41px; max-width: 740px; }
    #post-canvas.variant-pattern .body-block { top: 540px; right: 41px; max-width: 998px; }

    /* Paysend wordmark at bottom (used by solid + pattern variants) */
    .bottom-brand {
      position: absolute;
      left: 41px; bottom: 41px;
      display: flex; align-items: center; gap: 12px;
      z-index: 3;
    }
    .bottom-brand .logo-paysend {
      height: 48px; width: auto;
      filter: brightness(0) invert(1);
    }
    #post-canvas.variant-solid .bottom-brand .logo-paysend {
      filter: var(--brand-filter-on-accent, brightness(0) invert(1));
    }
    #post-canvas.variant-solid .bottom-brand {
      /* show the wordmark in text-on-accent color */
    }
    /* Hide bottom-brand where design doesn't show one */
    #post-canvas.variant-dark .bottom-brand,
    #post-canvas.variant-split .bottom-brand { display: none; }
    #post-canvas.variant-pattern .bottom-brand .logo-paysend { height: 96px; }

    /* ── Toggle + controls styles ── */
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 20px; transition: background 0.2s; }
    .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle-switch input:checked + .toggle-slider { background: #141414; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); }
    .section-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .section-row .control-label { margin-bottom: 0; }
    .section-body { display: flex; flex-direction: column; gap: 10px; }
    .control-section.section-off .section-body { display: none; }
    .sub-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: 4px; display: block; }

    .controls {
      background: #fff; border-left: 1px solid #e8e8e8;
      padding: 24px 20px; display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto;
    }
    .control-section { display: flex; flex-direction: column; gap: 6px; }
    .control-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #888; }
    .control-input, .control-textarea {
      width: 100%; padding: 9px 11px;
      border: 1px solid #e0e0e0; border-radius: 6px;
      font-size: 14px; font-family: inherit; color: #1a1a1a;
      background: #fafafa; transition: border-color 0.15s; resize: none;
    }
    .control-input:focus, .control-textarea:focus { outline: none; border-color: #17bff2; background: #fff; }
    .divider { height: 1px; background: #f0f0f0; margin: 2px 0; }

    .seg-control { display: flex; gap: 4px; background: #f5f5f5; padding: 4px; border-radius: 8px; flex-wrap: wrap; }
    .seg-btn {
      flex: 1 1 45%;
      padding: 8px 10px; font-size: 12px; font-weight: 600;
      font-family: inherit; color: #555; background: transparent;
      border: none; border-radius: 6px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      min-width: 0;
    }
    .seg-btn.active { background: #141414; color: #fff; }
    .seg-btn:not(.active):hover { color: #141414; }

    .color-palette { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .color-swatch {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.12s, border-color 0.12s; flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #141414; transform: scale(1.1); box-shadow: 0 0 0 1px #fff inset; }

    .upload-zone {
      border: 2px dashed #ddd; border-radius: 8px; padding: 12px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      min-height: 70px; display: flex; align-items: center; justify-content: center;
    }
    .upload-zone:hover { border-color: #17bff2; background: #f0fbff; }
    .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #aaa; font-size: 12px; }
    .upload-icon { font-size: 18px; line-height: 1; }
    .upload-hint { font-size: 11px; color: #ccc; }
    .upload-preview { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
    .upload-preview img { width: 100%; height: 60px; object-fit: cover; border-radius: 4px; }
    .remove-photo { font-size: 11px; color: #e94560; background: none; border: none; cursor: pointer; padding: 2px 4px; font-family: inherit; }
    .remove-photo:hover { text-decoration: underline; }

    /* Controls visibility per variant */
    .only-solid, .only-dark-split, .only-pattern { display: none; }
    .controls.variant-solid .only-solid { display: flex; }
    .controls.variant-dark  .only-dark-split { display: flex; }
    .controls.variant-split .only-dark-split { display: flex; }
    .controls.variant-pattern .only-pattern { display: flex; }

    .download-btn {
      margin-top: auto; padding: 13px 20px;
      background: #141414; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }
    .download-btn:hover:not(:disabled) { background: #333; }
    .download-btn:active:not(:disabled) { transform: scale(0.98); }
    .download-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 1199px) { .workspace { grid-template-columns: 1fr 33vw; } }
    @media (max-width: 799px)  { .workspace { grid-template-columns: 1fr 40vw; } }
    @media (max-width: 499px) {
      html, body { height: auto; overflow: auto; }
      .workspace { display: flex; flex-direction: column; overflow: visible; height: auto; }
      .preview-area { padding: 0; overflow: visible; justify-content: flex-start; align-items: stretch; flex-shrink: 0; height: auto; }
      .preview-wrapper { width: 100vw !important; border-radius: 0; box-shadow: none; flex-shrink: 0; }
      .preview-hint { display: none; }
      .controls { border-left: none; border-top: 1px solid #e8e8e8; height: auto; overflow-y: visible; flex: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" title="Back to layouts">
      <img class="header-logo" src="/assets/logo-planet.svg" alt="Paysend" />
    </a>
    <h1>Post Builder</h1>
    <p>1080 × 1350 Milestone</p>
  </header>

  <main class="workspace">

  <div class="preview-area">
    <div class="preview-wrapper">
      <div id="post-canvas" class="variant-dark" style="--accent:#ff574a">

        <!-- Background layers (each only visible in its variant) -->
        <div class="bg-solid"></div>
        <div class="bg-photo" id="bg-photo"></div>
        <div class="bg-dark-full"></div>
        <div class="bg-pattern-strip-bottom"></div>
        <div class="bg-pattern-strip-top"></div>
        <div class="bg-dark-bottom"></div>
        <div class="bg-pattern-full"></div>

        <div class="top-brand">
          <img class="logo-paysend" src="/assets/logo-paysend-wordmark.svg" alt="Paysend" />
        </div>

        <div class="news-tag" id="news-tag">
          <span id="preview-tag">news</span>
        </div>

        <div class="headline" id="headline">
          <p id="preview-headline">Big Milestone for Paysend Canada!</p>
        </div>

        <div class="body-block" id="body-block">
          <p id="preview-body">Now officially registered as a Payment Service Provider (PSP) under Canada's new regulatory framework. Proud to be one of the first in the country!</p>
        </div>

        <div class="bottom-brand">
          <img class="logo-paysend" src="/assets/logo-paysend-wordmark.svg" alt="Paysend" />
        </div>

      </div>
    </div>
    <p class="preview-hint">Preview scaled — exports 1080 × 1350</p>
  </div>

  <div class="controls variant-dark">

    <!-- Variant switch -->
    <div class="control-section">
      <label class="control-label">Variant</label>
      <div class="seg-control" id="variant-switch">
        <button class="seg-btn" data-variant="solid" type="button">Solid + Photo</button>
        <button class="seg-btn active" data-variant="dark" type="button">Dark</button>
        <button class="seg-btn" data-variant="split" type="button">Split</button>
        <button class="seg-btn" data-variant="pattern" type="button">Pattern</button>
      </div>
    </div>

    <!-- Accent color (solid variant) -->
    <div class="control-section only-solid">
      <label class="control-label">Accent Color</label>
      <div class="color-palette" id="color-palette">
        <button class="color-swatch" data-color="#08ffce" style="background:#08ffce" title="Cyan"></button>
        <button class="color-swatch" data-color="#17bff2" style="background:#17bff2" title="Sky Blue"></button>
        <button class="color-swatch" data-color="#4a57c5" style="background:#4a57c5" title="Indigo"></button>
        <button class="color-swatch" data-color="#08c197" style="background:#08c197" title="Teal"></button>
        <button class="color-swatch" data-color="#a0eb31" style="background:#a0eb31" title="Lime"></button>
        <button class="color-swatch" data-color="#f7e43d" style="background:#f7e43d" title="Yellow"></button>
        <button class="color-swatch" data-color="#f7ab3d" style="background:#f7ab3d" title="Orange"></button>
        <button class="color-swatch active" data-color="#ff574a" style="background:#ff574a" title="Red"></button>
        <button class="color-swatch" data-color="#b75eff" style="background:#b75eff" title="Purple"></button>
        <button class="color-swatch" data-color="#fe94da" style="background:#fe94da" title="Pink"></button>
      </div>
    </div>

    <!-- Right-side photo (solid variant) -->
    <div class="control-section only-solid">
      <label class="control-label">Side Photo</label>
      <div class="upload-zone" id="photo-zone">
        <div class="upload-placeholder">
          <span class="upload-icon">↑</span>
          <span>Click or drag</span>
          <span class="upload-hint">PNG, JPG, WEBP</span>
        </div>
        <div class="upload-preview" style="display:none">
          <img src="" alt="thumb" />
          <button class="remove-photo">Remove</button>
        </div>
      </div>
      <input type="file" accept="image/*" id="photo-file" style="display:none" />
    </div>

    <!-- News tag (dark / split only) -->
    <div class="control-section only-dark-split">
      <div class="section-row">
        <label class="control-label">News Tag</label>
        <label class="toggle-switch">
          <input type="checkbox" id="tag-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="section-body">
        <input class="control-input" id="input-tag" type="text" value="news" />
      </div>
    </div>

    <div class="divider"></div>

    <!-- Headline -->
    <div class="control-section">
      <div class="section-row">
        <label class="control-label">Headline</label>
        <label class="toggle-switch">
          <input type="checkbox" id="headline-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="section-body">
        <textarea class="control-textarea" id="input-headline" rows="3">Big Milestone for Paysend Canada!</textarea>
      </div>
    </div>

    <!-- Body -->
    <div class="control-section">
      <div class="section-row">
        <label class="control-label">Body Copy</label>
        <label class="toggle-switch">
          <input type="checkbox" id="body-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="section-body">
        <textarea class="control-textarea" id="input-body" rows="5">Now officially registered as a Payment Service Provider (PSP) under Canada's new regulatory framework. Proud to be one of the first in the country!</textarea>
      </div>
    </div>

    <button class="download-btn" id="download-btn">Download PNG</button>

  </div>
  </main>

  <script>
  const MAX_EDGE = 2400;
  const SMALL_FILE_BYTES = 400 * 1024;
  async function fileToOptimizedSrc(file) {
    if (file.type === 'image/svg+xml' || file.size <= SMALL_FILE_BYTES) { return URL.createObjectURL(file); }
    try {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, MAX_EDGE / Math.max(bitmap.width, bitmap.height));
      if (scale === 1) { bitmap.close(); return URL.createObjectURL(file); }
      const w = Math.round(bitmap.width * scale);
      const h = Math.round(bitmap.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      bitmap.close();
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.88));
      return URL.createObjectURL(blob);
    } catch { return URL.createObjectURL(file); }
  }

  const canvas = document.getElementById('post-canvas');
  const controlsEl = document.querySelector('.controls');

  function bindText(inputId, previewId) {
    const input = document.getElementById(inputId);
    const preview = document.getElementById(previewId);
    if (!input || !preview) return;
    input.addEventListener('input', () => { preview.textContent = input.value; });
  }
  bindText('input-tag', 'preview-tag');
  bindText('input-body', 'preview-body');

  // Headline binding: for the "solid" variant, wrap the first two lines
  // in <span class="hl">…</span> so they render as highlighted inline
  // text. For other variants, plain textContent is used.
  const headlineInput = document.getElementById('input-headline');
  const headlineEl = document.getElementById('preview-headline');
  function applyHeadline() {
    const text = headlineInput.value;
    if (canvas.classList.contains('variant-solid')) {
      const lines = text.split('\n');
      // Highlight every line except the last (so the "Canada!" line
      // lands on accent without a white chip behind it).
      if (lines.length === 1) {
        const words = text.split(/\s+/);
        const last = words.pop();
        const head = words.join(' ');
        headlineEl.innerHTML = (head ? `<span class="hl">${escapeHtml(head)}</span> ` : '') + escapeHtml(last);
      } else {
        const last = lines.pop();
        const head = lines.map(l => `<span class="hl">${escapeHtml(l)}</span>`).join('<br>');
        headlineEl.innerHTML = head + '<br>' + escapeHtml(last);
      }
    } else {
      headlineEl.textContent = text;
    }
    fitHeadline();
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
  }
  headlineInput.addEventListener('input', applyHeadline);

  // Headline auto-fit
  const HL_BASE = 108;
  const HL_MIN = 48;
  const CANVAS_PAD_X = 41;
  function longestWordWidth(el) {
    const text = (el.textContent || '').trim();
    if (!text) return 0;
    const words = text.split(/\s+/);
    const cs = getComputedStyle(el);
    const probe = document.createElement('span');
    probe.style.cssText = 'position:absolute;left:-99999px;top:-99999px;visibility:hidden;white-space:nowrap;';
    probe.style.fontFamily = cs.fontFamily;
    probe.style.fontSize = cs.fontSize;
    probe.style.fontWeight = cs.fontWeight;
    probe.style.fontStyle = cs.fontStyle;
    probe.style.letterSpacing = cs.letterSpacing;
    probe.style.textTransform = cs.textTransform;
    document.body.appendChild(probe);
    let max = 0;
    for (const w of words) { probe.textContent = w; if (probe.offsetWidth > max) max = probe.offsetWidth; }
    document.body.removeChild(probe);
    return max;
  }
  function fitHeadline() {
    const el = document.getElementById('preview-headline');
    if (!el) return;
    const headlineWrap = document.getElementById('headline');
    const available = headlineWrap.clientWidth;
    let size = HL_BASE;
    el.style.fontSize = size + 'px';
    for (let i = 0; i < 50; i++) {
      if (size <= HL_MIN) break;
      if (longestWordWidth(el) <= available + 0.5) break;
      size -= 2;
      el.style.fontSize = size + 'px';
    }
  }

  // Toggles
  function syncSectionOff(cb) {
    const section = cb.closest('.control-section');
    if (!section) return;
    section.classList.toggle('section-off', !cb.checked);
  }
  function bindToggle(toggleId, targetEl) {
    const cb = document.getElementById(toggleId);
    const apply = () => { targetEl.classList.toggle('hidden', !cb.checked); syncSectionOff(cb); };
    cb.addEventListener('change', apply);
    apply();
  }
  bindToggle('tag-toggle', document.getElementById('news-tag'));
  bindToggle('headline-toggle', document.getElementById('headline'));
  bindToggle('body-toggle', document.getElementById('body-block'));

  // Variant switch
  const variantSwitch = document.getElementById('variant-switch');
  function applyVariant(v) {
    ['solid','dark','split','pattern'].forEach(x => {
      canvas.classList.toggle('variant-' + x, x === v);
      controlsEl.classList.toggle('variant-' + x, x === v);
    });
    variantSwitch.querySelectorAll('.seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.variant === v);
    });
    applyHeadline();
  }
  variantSwitch.querySelectorAll('.seg-btn').forEach(b => {
    b.addEventListener('click', () => applyVariant(b.dataset.variant));
  });

  // Color palette (only meaningful in solid variant)
  const DARK_ACCENT = new Set(['#4a57c5', '#ff574a']);
  document.querySelectorAll('#color-palette .color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      canvas.style.setProperty('--accent', sw.dataset.color);
      canvas.style.setProperty('--text-on-accent', DARK_ACCENT.has(sw.dataset.color) ? '#fff' : '#141414');
      document.querySelectorAll('#color-palette .color-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
  });

  // Side photo upload → sets .bg-photo background-image
  (function setupPhotoUpload() {
    const zone = document.getElementById('photo-zone');
    const fileInput = document.getElementById('photo-file');
    const bgPhotoEl = document.getElementById('bg-photo');
    const placeholder = zone.querySelector('.upload-placeholder');
    const preview = zone.querySelector('.upload-preview');
    const thumb = preview.querySelector('img');
    const removeBtn = preview.querySelector('.remove-photo');
    function setSrc(src) {
      bgPhotoEl.style.backgroundImage = `url('${src}')`;
      thumb.src = src;
      placeholder.style.display = 'none';
      preview.style.display = 'flex';
    }
    function clearSrc() {
      bgPhotoEl.style.backgroundImage = '';
      fileInput.value = '';
      placeholder.style.display = 'flex';
      preview.style.display = 'none';
    }
    zone.addEventListener('click', e => { if (e.target === removeBtn || removeBtn.contains(e.target)) return; fileInput.click(); });
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#141414'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
    zone.addEventListener('drop', async e => { e.preventDefault(); zone.style.borderColor = ''; const f = e.dataTransfer.files[0]; if (f) setSrc(await fileToOptimizedSrc(f)); });
    fileInput.addEventListener('change', async () => { const f = fileInput.files[0]; if (f) setSrc(await fileToOptimizedSrc(f)); });
    removeBtn.addEventListener('click', e => { e.stopPropagation(); clearSrc(); });
  })();

  // Preview scaling
  (function scalePreview() {
    const CANVAS_W = 1080, CANVAS_H = 1350;
    const PREVIEW_PAD = 64; const HEADER_H = 60;
    const wrapper = document.querySelector('.preview-wrapper');
    const cvs = document.getElementById('post-canvas');
    function update() {
      const w = window.innerWidth, h = window.innerHeight;
      let sidebarFrac;
      if (w < 500) sidebarFrac = 0;
      else if (w < 800) sidebarFrac = 0.40;
      else if (w < 1200) sidebarFrac = 0.33;
      else sidebarFrac = 0.25;
      let availW, availH;
      if (w < 500) { availW = w; availH = Infinity; }
      else { availW = w * (1 - sidebarFrac) - PREVIEW_PAD; availH = h - HEADER_H - 80; }
      const scale = Math.min(availW / CANVAS_W, availH / CANVAS_H);
      wrapper.style.width = Math.round(CANVAS_W * scale) + 'px';
      wrapper.style.height = Math.round(CANVAS_H * scale) + 'px';
      cvs.style.transform = `scale(${scale})`;
    }
    update();
    window.addEventListener('resize', update);
  })();

  document.getElementById('download-btn').addEventListener('click', async () => {
    const btn = document.getElementById('download-btn');
    btn.textContent = 'Exporting…'; btn.disabled = true;
    try {
      const result = await html2canvas(canvas, {
        scale: 1, width: 1080, height: 1350,
        useCORS: true, allowTaint: true, backgroundColor: null, logging: false
      });
      const link = document.createElement('a');
      link.download = 'paysend-milestone.png';
      link.href = result.toDataURL('image/png');
      link.click();
    } catch (err) { console.error('Download failed:', err); }
    finally { btn.textContent = 'Download PNG'; btn.disabled = false; }
  });

  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(() => applyHeadline()); }
  else { applyHeadline(); }
  </script>
</body>
</html>
